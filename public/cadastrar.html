<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cadastro de Visitantes</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body style="visibility: hidden">
    <!-- Tela de Login -->
    <div class="login-screen container" style="display: none">
      <h2>Acesso à Recepção</h2>
      <form id="loginForm">
        <label for="senha">Senha:</label>
        <input id="senha" type="password" required />
        <button type="submit">Entrar</button>
      </form>
      <p id="loginMsg"></p>
    </div>

    <!-- Tela Principal -->
    <div class="main-screen container" style="display: none">
      <h2>Cadastro de Visitantes</h2>

      <div style="text-align: center; margin-bottom: 20px">
        <a
          href="/visitantes-hoje.html"
          style="
            display: inline-block;
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
          "
          >📋 Ver Visitantes de Hoje</a
        >
        <button
          id="btnSync"
          style="
            margin-left: 10px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          🔄 Sincronizar
        </button>
      </div>
      <p id="syncMsg" style="text-align: center; color: #666"></p>
      <p id="syncStatus" style="text-align: center; color: #666"></p>

      <form id="form">
        <div class="autocomplete-box">
          <label for="telefone">Telefone (identificador)</label>
          <input
            id="telefone"
            name="telefone"
            placeholder="(31) 98877-6655"
            maxlength="15"
            autocomplete="off"
          />
          <p id="telefoneMsg" style="margin: 6px 0 0; color: #666">
            Usaremos seu telefone apenas para contato relacionado à visita.
          </p>
          <div id="sugestoes-telefone" class="sugestoes"></div>
        </div>

        <div class="autocomplete-box">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" autocomplete="off" required />
          <div id="sugestoes" class="sugestoes"></div>
        </div>

        <label for="acompanhantes">Acompanhantes</label>
        <input
          id="acompanhantes"
          name="acompanhantes"
          type="number"
          min="0"
          value="0"
        />

        <label for="observacao">Observação</label>
        <textarea
          id="observacao"
          name="observacao"
          rows="3"
          placeholder="Ex: Esposa Maria, filhos Pedro e Ana"
        ></textarea>

        <button type="submit">Registrar</button>
      </form>

      <p id="msg"></p>
    </div>

    <div id="telefoneModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="telefoneModalTitle" aria-describedby="telefoneModalDesc">
        <h3 id="telefoneModalTitle">Sem telefone por enquanto?</h3>
        <p id="telefoneModalDesc">
          Tudo bem seguir sem telefone. Se o visitante lembrar depois, voce pode
          atualizar em uma proxima visita.
        </p>
        <div class="modal-actions">
          <button type="button" id="telefoneModalCancel" class="btn-secondary">
            Voltar e informar telefone
          </button>
          <button type="button" id="telefoneModalConfirm" class="btn-primary">
            Continuar sem telefone
          </button>
        </div>
      </div>
    </div>

    <script>
      // ---------- utils
      function normaliza(str) {
        if (!str) return "";
        return str
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9 ]/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function normalizaTelefone(str) {
        if (!str) return "";
        return str.replace(/\D/g, "");
      }

      function confirmarSemTelefone() {
        const overlay = document.querySelector("#telefoneModal");
        const btnConfirm = document.querySelector("#telefoneModalConfirm");
        const btnCancel = document.querySelector("#telefoneModalCancel");
        const prevFocus = document.activeElement;

        return new Promise((resolve) => {
          function cleanup(result) {
            overlay.classList.add("hidden");
            overlay.setAttribute("aria-hidden", "true");
            btnConfirm.removeEventListener("click", onConfirm);
            btnCancel.removeEventListener("click", onCancel);
            overlay.removeEventListener("click", onOverlayClick);
            document.removeEventListener("keydown", onKey);
            if (prevFocus && typeof prevFocus.focus === "function") {
              prevFocus.focus();
            }
            resolve(result);
          }

          function onConfirm() {
            cleanup(true);
          }

          function onCancel() {
            cleanup(false);
          }

          function onOverlayClick(e) {
            if (e.target === overlay) cleanup(false);
          }

          function onKey(e) {
            if (e.key === "Escape") cleanup(false);
          }

          overlay.classList.remove("hidden");
          overlay.setAttribute("aria-hidden", "false");
          btnConfirm.addEventListener("click", onConfirm);
          btnCancel.addEventListener("click", onCancel);
          overlay.addEventListener("click", onOverlayClick);
          document.addEventListener("keydown", onKey);
          btnConfirm.focus();
        });
      }

      // -------- localStorage helpers
      function getVisitantesLocal() {
        return JSON.parse(localStorage.getItem("visitantesLocal") || "[]");
      }
      function salvarVisitantesLocal(lista) {
        localStorage.setItem("visitantesLocal", JSON.stringify(lista));
      }

      function formatarHora(data = new Date()) {
        return data.toLocaleTimeString("pt-BR", {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function getExclusoesLocal() {
        return JSON.parse(
          localStorage.getItem("exclusoesVisitantes") || "[]",
        );
      }

      function salvarExclusoesLocal(lista) {
        localStorage.setItem("exclusoesVisitantes", JSON.stringify(lista));
      }

      function limparExclusoesAntigas() {
        const hoje = new Date().toISOString().split("T")[0];
        const ontem = new Date(Date.now() - 24 * 60 * 60 * 1000)
          .toISOString()
          .split("T")[0];
        const filtradas = getExclusoesLocal().filter(
          (e) => e.data === hoje || e.data === ontem,
        );
        salvarExclusoesLocal(filtradas);
        return filtradas;
      }

      function adicionarVisitanteLocal(nome, telefone) {
        const lista = getVisitantesLocal();
        const nomeNorm = normaliza(nome);
        const telefoneNorm = normalizaTelefone(telefone);
        const hoje = new Date().toISOString().split("T")[0]; // YYYY-MM-DD
        let existente = null;

        if (telefoneNorm) {
          existente = lista.find(
            (v) =>
              (v.telefoneNorm || normalizaTelefone(v.telefone || "")) ===
              telefoneNorm,
          );
        }

        if (!existente) {
          existente = lista.find((v) => v.nomeNorm === nomeNorm);
        }

        if (existente) {
          // Verifica se já cadastrou hoje
          if (existente.ultima_visita === hoje) {
            return { tipo: "ja_cadastrado_hoje", visitante: existente };
          }

          // Atualiza visita
          existente.visitas = (existente.visitas || 1) + 1;
          existente.nome = nome || existente.nome;
          existente.nomeNorm = normaliza(existente.nome);
          existente.telefone = telefone || existente.telefone;
          existente.telefoneNorm =
            telefoneNorm || existente.telefoneNorm || "";
          existente.ultima_visita = hoje;
          salvarVisitantesLocal(lista);
          return { tipo: "retorno", visitante: existente };
        }

        const novo = {
          id: crypto.randomUUID(),
          nome,
          nomeNorm,
          telefone,
          telefoneNorm,
          visitas: 1,
          ultima_visita: hoje,
        };
        lista.push(novo);
        salvarVisitantesLocal(lista);
        return { tipo: "novo", visitante: novo };
      }

      function buscarVisitantesLocal(term) {
        if (!term) return [];
        const q = normaliza(term);
        return getVisitantesLocal().filter((v) => v.nomeNorm.includes(q));
      }

      function buscarVisitantesPorTelefone(term) {
        if (!term) return [];
        const q = normalizaTelefone(term);
        if (!q) return [];
        return getVisitantesLocal().filter((v) => {
          const tel = v.telefoneNorm || normalizaTelefone(v.telefone || "");
          return tel.startsWith(q);
        });
      }

      function encontrarPorTelefone(telefone) {
        const q = normalizaTelefone(telefone);
        if (!q) return null;
        return (
          getVisitantesLocal().find((v) => {
            const tel = v.telefoneNorm || normalizaTelefone(v.telefone || "");
            return tel === q;
          }) || null
        );
      }

      // --------- Máscara de telefone
      function mascaraTelefone(valor) {
        valor = valor.replace(/\D/g, "");
        if (valor.length <= 10) {
          // Fixo: (31) 3524-4564
          valor = valor.replace(/(\d{2})(\d)/, "($1) $2");
          valor = valor.replace(/(\d{4})(\d)/, "$1-$2");
        } else {
          // Celular: (31) 98877-6655
          valor = valor.replace(/(\d{2})(\d)/, "($1) $2");
          valor = valor.replace(/(\d{5})(\d)/, "$1-$2");
        }
        return valor;
      }

      // --------- UI autocomplete
      function setupAutoComplete() {
        const input = document.querySelector("#nome");
        const sugestoes = document.querySelector("#sugestoes");

        input.addEventListener("input", () => {
          const valor = input.value;
          const resultados = buscarVisitantesLocal(valor);
          sugestoes.innerHTML = "";

          resultados.slice(0, 10).forEach((v) => {
            const item = document.createElement("div");
            item.className = "sugestao-item";
            item.textContent = `${v.nome} (${v.telefone ? mascaraTelefone(v.telefone) : "-"}) - visitas: ${v.visitas || 1}`;
            item.onclick = () => {
              document.querySelector("#nome").value = v.nome;
              const telInput = document.querySelector("#telefone");
              telInput.value = mascaraTelefone(v.telefone || "");
              sugestoes.innerHTML = "";
            };
            sugestoes.appendChild(item);
          });
        });
      }

      function setupTelefoneAutoComplete() {
        const input = document.querySelector("#telefone");
        const sugestoes = document.querySelector("#sugestoes-telefone");
        const telefoneMsg = document.querySelector("#telefoneMsg");

        input.addEventListener("input", () => {
          const valor = input.value;
          const resultados = buscarVisitantesPorTelefone(valor);
          sugestoes.innerHTML = "";

          const existente = encontrarPorTelefone(valor);
          if (existente) {
            document.querySelector("#nome").value = existente.nome;
            telefoneMsg.textContent = `Telefone já cadastrado para ${existente.nome}. Você pode registrar a visita.`;
            telefoneMsg.style.color = "#1a7f37";
          } else {
            telefoneMsg.textContent =
              "Usaremos seu telefone apenas para contato relacionado à visita.";
            telefoneMsg.style.color = "#666";
          }

          resultados.slice(0, 10).forEach((v) => {
            const item = document.createElement("div");
            item.className = "sugestao-item";
            item.textContent = `${v.nome} (${v.telefone ? mascaraTelefone(v.telefone) : "-"}) - visitas: ${v.visitas || 1}`;
            item.onclick = () => {
              document.querySelector("#nome").value = v.nome;
              input.value = mascaraTelefone(v.telefone || "");
              sugestoes.innerHTML = "";
            };
            sugestoes.appendChild(item);
          });
        });
      }

      // ---------- autenticação e sincronização
      const BASE = ""; // se precisar, coloque base url. por default requisita ao mesmo host
      let autenticado = false;
      let dadosCache = null;

      // Faz login com senha fornecida
      async function fazerLogin(senha) {
        try {
          const res = await fetch((BASE || "") + "/interno/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ senha }),
          });

          if (res.ok) {
            autenticado = true;
            return true;
          }
        } catch (err) {
          console.error("Erro no login:", err);
        }
        return false;
      }

      // Mostra/esconde telas
      function mostrarLogin() {
        document.querySelector(".login-screen").style.display = "block";
        document.querySelector(".main-screen").style.display = "none";
      }

      // TODO Tenho funções duplicadas em cadastrar.html e visitantes-hoje.html para mostrar/esconder telas. Poderia unificar isso em um helper comum, para evitar repetição. Ou mesmo criar uma estrutura de SPA, onde não precisaria recarregar a página para navegar entre "cadastro" e "visitantes de hoje", o que também permitiria compartilhar estado (ex: lista de visitantes) entre as telas.
      function mostrarPrincipal() {
        document.querySelector(".login-screen").style.display = "none";
        document.querySelector(".main-screen").style.display = "block";
      }

      async function enviarAoBackend(
        nome,
        telefone,
        acompanhantes,
        observacao,
      ) {
        if (!autenticado) return null;

        try {
          const payload = { nome, telefone, acompanhantes, observacao };
          const headers = { "Content-Type": "application/json" };

          const res = await fetch((BASE || "") + "/interno/visitantes", {
            method: "POST",
            headers,
            body: JSON.stringify(payload),
          });

          return await res.json();
        } catch (err) {
          console.error("Erro enviando ao backend", err);
          return null;
        }
      }

      // TODO Melhorar lógica de sincronização: atualmente é "envia tudo local -> depois baixa tudo servidor". Poderia baseado em timestamps, para evitar enviar dados desnecessários e manter sempre o coerente.
      // Sincronização bidirecional: envia locais -> servidor, depois baixa servidor -> local
      async function sincronizarDoBackend(usarCache = false) {
        if (!autenticado) return;

        try {
          const local = getVisitantesLocal();
          const hoje = new Date().toISOString().split("T")[0];
          const exclusoes = limparExclusoesAntigas();
          const bloqueadosHoje = new Set(
            exclusoes
              .filter((e) => e.data === hoje)
              .map((e) => e.nomeNorm),
          );

          const localFiltrado = local.filter((v) => {
            const nomeNorm = v.nomeNorm || normaliza(v.nome || "");
            const visitaHoje = v.ultima_visita === hoje;
            return !(visitaHoje && bloqueadosHoje.has(nomeNorm));
          });

          if (localFiltrado.length !== local.length) {
            salvarVisitantesLocal(localFiltrado);
          }

          // 1. Envia dados locais para o servidor
          if (localFiltrado.length > 0) {
            await fetch((BASE || "") + "/interno/sync", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ visitantes: localFiltrado }),
            });
          }

          // 2. Baixa dados atualizados do servidor (ou usa cache)
          let listaServidor;

          if (usarCache && dadosCache) {
            listaServidor = dadosCache;
            dadosCache = null;
          } else {
            const res = await fetch((BASE || "") + "/interno/visitantes/all");
            if (!res.ok) return;
            listaServidor = await res.json();
          }

          // 3. Atualiza localStorage com dados do servidor (servidor é fonte da verdade)
          const map = new Map();

          listaServidor.forEach((v) => {
            const nomeNorm = normaliza(v.nome);
            const telefoneNorm = normalizaTelefone(v.telefone || "");
            const chave = telefoneNorm || nomeNorm;
            map.set(chave, {
              id: crypto.randomUUID(),
              nome: v.nome,
              nomeNorm,
              telefone: v.telefone || "",
              telefoneNorm,
              visitas: v.visitas || 1,
              ultima_visita: v.ultima_visita || null, // Traz data do servidor
            });
          });

          salvarVisitantesLocal(Array.from(map.values()));
          return true;
        } catch (err) {
          console.warn("Sincronização falhou:", err);
          return false;
        }
      }

      // Verifica se já está autenticado
      async function verificarSessao() {
        try {
          const res = await fetch((BASE || "") + "/interno/visitantes/all");
          if (res.ok) {
            autenticado = true;
            dadosCache = await res.json();
            return true;
          }
        } catch (err) {
          console.log("Sessão não ativa");
        }
        return false;
      }

      // ---------- inicialização
      document.addEventListener("DOMContentLoaded", async () => {
        setupAutoComplete();
        setupTelefoneAutoComplete();

        // Aplicar máscara no telefone
        const telInput = document.querySelector("#telefone");
        telInput.addEventListener("input", (e) => {
          e.target.value = mascaraTelefone(e.target.value);
        });

        // Verifica se já está autenticado
        const jaAutenticado = await verificarSessao();

        // Mostra o body após verificar sessão
        document.body.style.visibility = "visible";

        if (jaAutenticado) {
          mostrarPrincipal();
          const syncStatus = document.querySelector("#syncStatus");
          syncStatus.textContent = "Sincronizando...";
          syncStatus.style.color = "#666";
          const ok = await sincronizarDoBackend(true); // Usa cache da verificação
          if (ok) {
            syncStatus.textContent = `Última sincronização: ${formatarHora()}`;
            syncStatus.style.color = "#666";
          } else {
            syncStatus.textContent = "Erro de sincronização";
            syncStatus.style.color = "red";
          }
        } else {
          mostrarLogin();
        }

        // Form de login
        const loginForm = document.querySelector("#loginForm");
        const loginMsg = document.querySelector("#loginMsg");

        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const senha = document.querySelector("#senha").value;

          const sucesso = await fazerLogin(senha);
          if (sucesso) {
            mostrarPrincipal();
            await sincronizarDoBackend();
            loginMsg.textContent = "";
          } else {
            loginMsg.textContent = "Senha incorreta";
            loginMsg.style.color = "red";
          }
        });

        // Form principal
        const form = document.querySelector("#form");
        const msg = document.querySelector("#msg");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          let nome = document.querySelector("#nome").value.trim();
          let telefone = document.querySelector("#telefone").value.trim();
          const telefoneNorm = normalizaTelefone(telefone);
          if (!telefoneNorm) {
            const ok = await confirmarSemTelefone();
            if (!ok) return;
          }
          telefone = telefoneNorm;
          const acompanhantes =
            parseInt(document.querySelector("#acompanhantes").value) || 0;
          const observacao = document.querySelector("#observacao").value.trim();

          if (!nome) return;

          const existentePorTelefone = encontrarPorTelefone(telefone);
          if (existentePorTelefone) {
            nome = existentePorTelefone.nome;
            document.querySelector("#nome").value = nome;
          }

          // tenta enviar ao backend primeiro
          const backendRes = await enviarAoBackend(
            nome,
            telefone,
            acompanhantes,
            observacao,
          );

          if (backendRes && backendRes.status === "ok") {
            if (backendRes.res.tipo === "ja_cadastrado_hoje") {
              msg.textContent = "Visitante já foi cadastrado hoje!";
              msg.style.color = "orange";
            } else {
              // só adiciona local se backend permitiu
              const localRes = adicionarVisitanteLocal(nome, telefone);

              if (backendRes.res.tipo === "novo")
                msg.textContent = "Visitante cadastrado";
              else msg.textContent = "Visitante retorno marcado";

              msg.textContent += " — sincronizado";
              msg.style.color = "green";
            }
          } else {
            // fallback: adiciona só local se backend falhou
            const localRes = adicionarVisitanteLocal(nome, telefone);

            if (localRes.tipo === "ja_cadastrado_hoje") {
              msg.textContent = "Visitante já foi cadastrado hoje (local)!";
              msg.style.color = "orange";
            } else if (localRes.tipo === "novo") {
              msg.textContent = "Visitante cadastrado (apenas local)";
              msg.style.color = "red";
            } else {
              msg.textContent = "Visitante retorno marcado (apenas local)";
              msg.style.color = "red";
            }
          }

          // Limpa mensagem após 3 segundos
          setTimeout(() => {
            msg.textContent = "";
          }, 3000);

          form.reset();
        });

        // Botão de sincronização manual
        const btnSync = document.querySelector("#btnSync");
        const syncMsg = document.querySelector("#syncMsg");

        btnSync.addEventListener("click", async () => {
          syncMsg.textContent = "Sincronizando...";
          syncMsg.style.color = "#666";
          const syncStatus = document.querySelector("#syncStatus");
          syncStatus.textContent = "Sincronizando...";
          syncStatus.style.color = "#666";

          const ok = await sincronizarDoBackend();

          if (ok) {
            syncMsg.textContent = "✓ Sincronizado com sucesso!";
            syncMsg.style.color = "green";
            syncStatus.textContent = `Última sincronização: ${formatarHora()}`;
            syncStatus.style.color = "#666";
          } else {
            syncMsg.textContent = "Erro na sincronização";
            syncMsg.style.color = "red";
            syncStatus.textContent = "Erro de sincronização";
            syncStatus.style.color = "red";
          }

          setTimeout(() => {
            syncMsg.textContent = "";
          }, 3000);
        });
      });
    </script>
  </body>
</html>
